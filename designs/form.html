<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bloat - Input Form</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#929090",
                        "surface-dim": "#131313",
                        "tertiary": "#c9c6c5",
                        "primary-fixed-dim": "#ffb5a0",
                        "primary-container": "#ff5722",
                        "surface-variant": "#353535",
                        "primary": "#ffb5a0",
                        "on-error": "#690005",
                        "background": "#131313",
                        "error-container": "#93000a",
                        "surface-bright": "#393939",
                        "on-tertiary": "#313030",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#862200",
                        "on-error-container": "#ffdad6",
                        "outline": "#ab8980",
                        "on-primary": "#5f1500",
                        "surface-container-highest": "#353535",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#e5e2e1",
                        "on-secondary-fixed-variant": "#454747",
                        "on-tertiary-container": "#2a2a29",
                        "on-secondary-container": "#b4b5b5",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#c6c6c7",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#ffdbd1",
                        "surface-container": "#20201f",
                        "inverse-surface": "#e5e2e1",
                        "secondary-container": "#454747",
                        "on-tertiary-fixed": "#1c1b1b",
                        "outline-variant": "#5b4039",
                        "secondary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#3b0900",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#c9c6c5",
                        "surface-container-high": "#2a2a2a",
                        "inverse-primary": "#b02f00",
                        "on-secondary": "#2f3131",
                        "on-primary-container": "#541200",
                        "on-surface-variant": "#e4beb4",
                        "surface-tint": "#ffb5a0",
                        "on-secondary-fixed": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "24px",
                        "unit": "4px",
                        "xs": "4px",
                        "xl": "48px"
                    },
                    "fontFamily": {
                        "h1": [
                            "Inter"
                        ],
                        "label-caps": [
                            "Inter"
                        ],
                        "body-base": [
                            "Inter"
                        ],
                        "metric-xl": [
                            "Inter"
                        ],
                        "metric-lg": [
                            "Inter"
                        ],
                        "h2": [
                            "Inter"
                        ],
                        "body-sm": [
                            "Inter"
                        ]
                    },
                    "fontSize": {
                        "h1": [
                            "24px",
                            {
                                "lineHeight": "32px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                            }
                        ],
                        "label-caps": [
                            "11px",
                            {
                                "lineHeight": "12px",
                                "letterSpacing": "0.05em",
                                "fontWeight": "600"
                            }
                        ],
                        "body-base": [
                            "14px",
                            {
                                "lineHeight": "20px",
                                "fontWeight": "400"
                            }
                        ],
                        "metric-xl": [
                            "48px",
                            {
                                "lineHeight": "1.1",
                                "letterSpacing": "-0.04em",
                                "fontWeight": "700"
                            }
                        ],
                        "metric-lg": [
                            "32px",
                            {
                                "lineHeight": "1.2",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "600"
                            }
                        ],
                        "h2": [
                            "20px",
                            {
                                "lineHeight": "28px",
                                "fontWeight": "600"
                            }
                        ],
                        "body-sm": [
                            "12px",
                            {
                                "lineHeight": "16px",
                                "fontWeight": "400"
                            }
                        ]
                    }
                },
            }
        }
    </script>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base">
    <!-- TopNavBar Component -->
    <nav
        class="flex justify-between items-center w-full px-lg py-md sticky top-0 z-50 bg-surface dark:bg-surface border-b border-outline-variant docked full-width top-0">
        <div class="font-h1 text-h1 font-bold text-primary dark:text-primary">Bloat</div>
        <div class="flex items-center gap-md">
            <button
                class="bg-primary-container text-on-primary-container rounded px-md py-sm font-body-base font-bold hover:opacity-90 transition-opacity">Start
                audit</button>
        </div>
    </nav>
    <!-- Main Canvas -->
    <main class="flex-grow flex flex-col items-center w-full px-md py-xl">
        <div class="w-full max-w-[640px] flex flex-col gap-xl">
            <!-- Step Indicator Pill -->
            <div
                class="mx-auto inline-flex items-center gap-sm px-md py-sm rounded-full bg-surface-container-low border border-surface-container">
                <span class="font-label-caps text-label-caps text-on-surface">Your tools</span>
                <span class="material-symbols-outlined text-[14px] text-on-surface-variant"
                    data-icon="arrow_forward">arrow_forward</span>
                <span class="font-label-caps text-label-caps text-on-surface-variant">Results</span>
            </div>
            <!-- Form Content -->
            <div class="flex flex-col gap-xl">
                <!-- Global Settings Section -->
                <section class="flex flex-col gap-lg border-b border-surface-container pb-xl">
                    <!-- Team Size -->
                    <div class="flex flex-col gap-sm">
                        <label class="font-label-caps text-label-caps text-on-surface" for="team-size">Team Size</label>
                        <input
                            class="bg-surface-container-lowest border border-surface-container text-on-surface font-body-base rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container px-md py-sm w-full outline-none transition-colors"
                            id="team-size" placeholder="e.g. 50" type="number" />
                    </div>
                    <!-- Use Case Selector -->
                    <div class="flex flex-col gap-sm">
                        <label class="font-label-caps text-label-caps text-on-surface">Primary Use Case</label>
                        <div class="flex flex-wrap gap-sm">
                            <button
                                class="px-md py-sm rounded-full border border-surface-container bg-surface-container-low text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container transition-colors"
                                type="button">Coding</button>
                            <button
                                class="px-md py-sm rounded-full border border-surface-container bg-surface-container-low text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container transition-colors"
                                type="button">Writing</button>
                            <button
                                class="px-md py-sm rounded-full border border-surface-container bg-surface-container-low text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container transition-colors"
                                type="button">Data</button>
                            <button
                                class="px-md py-sm rounded-full border border-surface-container bg-surface-container-low text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container transition-colors"
                                type="button">Research</button>
                            <button
                                class="px-md py-sm rounded-full border border-primary-container bg-primary-container text-on-primary-container font-label-caps text-label-caps transition-colors"
                                type="button">Mixed</button>
                        </div>
                    </div>
                </section>
                <!-- Tool Input Section -->
                <section class="flex flex-col gap-md">
                    <div class="flex justify-between items-center">
                        <h2 class="font-h2 text-h2 text-on-surface">Add a tool</h2>
                    </div>
                    <!-- Tool Card (Minimalist Card) -->
                    <div
                        class="bg-surface-container-low border border-surface-container rounded-lg p-lg flex flex-col gap-lg">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
                            <!-- Tool Dropdown -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-caps text-label-caps text-on-surface">Tool</label>
                                <select
                                    class="bg-surface-container-lowest border border-surface-container text-on-surface font-body-base rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container px-md py-sm w-full outline-none transition-colors appearance-none">
                                    <option disabled="" selected="" value="">Select a tool...</option>
                                    <option value="cursor">Cursor</option>
                                    <option value="claude">Claude</option>
                                    <option value="chatgpt">ChatGPT</option>
                                </select>
                            </div>
                            <!-- Plan Dropdown -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-caps text-label-caps text-on-surface">Plan</label>
                                <select
                                    class="bg-surface-container-lowest border border-surface-container text-on-surface font-body-base rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container px-md py-sm w-full outline-none transition-colors appearance-none">
                                    <option value="free">Free</option>
                                    <option value="pro">Pro</option>
                                    <option value="enterprise">Enterprise</option>
                                </select>
                            </div>
                            <!-- Spend Input -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-caps text-label-caps text-on-surface">Monthly Spend ($)</label>
                                <input
                                    class="bg-surface-container-lowest border border-surface-container text-on-surface font-body-base rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container px-md py-sm w-full outline-none transition-colors"
                                    placeholder="0.00" type="number" />
                            </div>
                            <!-- Seats Input -->
                            <div class="flex flex-col gap-sm">
                                <label class="font-label-caps text-label-caps text-on-surface">Seats</label>
                                <input
                                    class="bg-surface-container-lowest border border-surface-container text-on-surface font-body-base rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container px-md py-sm w-full outline-none transition-colors"
                                    placeholder="1" type="number" />
                            </div>
                        </div>
                    </div>
                    <!-- Add Another Tool Button -->
                    <button
                        class="w-full border border-surface-container bg-transparent text-on-surface rounded px-lg py-md font-body-base font-bold hover:bg-surface-container-high transition-colors flex items-center justify-center gap-sm"
                        type="button">
                        <span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                        Add another tool
                    </button>
                </section>
                <!-- CTA & Note -->
                <div class="flex flex-col gap-sm mt-md">
                    <button
                        class="w-full bg-primary-container text-on-primary-container rounded px-lg py-md font-h2 text-h2 text-center hover:opacity-90 transition-opacity flex items-center justify-center gap-sm"
                        type="submit">
                        Run my audit
                        <span class="material-symbols-outlined text-[20px]"
                            data-icon="arrow_forward">arrow_forward</span>
                    </button>
                    <p
                        class="text-center font-body-sm text-body-sm text-on-surface-variant flex items-center justify-center gap-xs">
                        <span class="material-symbols-outlined text-[14px]" data-icon="cloud_done">cloud_done</span>
                        Form saves automatically
                    </p>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer Component -->
    <footer
        class="flex flex-col md:flex-row justify-between items-center w-full px-lg py-xl gap-md border-t border-outline-variant bg-surface dark:bg-surface full-width flat no shadows">
        <div class="font-body-sm text-body-sm text-secondary dark:text-secondary">© 2024 Bloat. Built by Credex.</div>
        <div class="flex gap-md font-body-sm text-body-sm text-on-surface-variant">
            <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-primary transition-colors" href="#">Contact</a>
        </div>
    </footer>
</body>

</html>
