<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bloat - AI Bill Audit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#929090",
                        "surface-dim": "#131313",
                        "tertiary": "#c9c6c5",
                        "primary-fixed-dim": "#ffb5a0",
                        "primary-container": "#ff5722",
                        "surface-variant": "#353535",
                        "primary": "#ffb5a0",
                        "on-error": "#690005",
                        "background": "#131313",
                        "error-container": "#93000a",
                        "surface-bright": "#393939",
                        "on-tertiary": "#313030",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#862200",
                        "on-error-container": "#ffdad6",
                        "outline": "#ab8980",
                        "on-primary": "#5f1500",
                        "surface-container-highest": "#353535",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#e5e2e1",
                        "on-secondary-fixed-variant": "#454747",
                        "on-tertiary-container": "#2a2a29",
                        "on-secondary-container": "#b4b5b5",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#c6c6c7",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#ffdbd1",
                        "surface-container": "#20201f",
                        "inverse-surface": "#e5e2e1",
                        "secondary-container": "#454747",
                        "on-tertiary-fixed": "#1c1b1b",
                        "outline-variant": "#5b4039",
                        "secondary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#3b0900",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#c9c6c5",
                        "surface-container-high": "#2a2a2a",
                        "inverse-primary": "#b02f00",
                        "on-secondary": "#2f3131",
                        "on-primary-container": "#541200",
                        "on-surface-variant": "#e4beb4",
                        "surface-tint": "#ffb5a0",
                        "on-secondary-fixed": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "24px",
                        "unit": "4px",
                        "xs": "4px",
                        "xl": "48px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-base": ["Inter"],
                        "metric-xl": ["Inter"],
                        "metric-lg": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["11px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-base": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "metric-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "metric-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-on-surface font-body-base min-h-screen flex flex-col">
    <!-- TopNavBar -->
    <header
        class="bg-surface dark:bg-surface flex justify-between items-center w-full px-lg py-md sticky top-0 z-50 border-b border-outline-variant flat no shadows">
        <div class="font-h1 text-h1 font-bold text-primary dark:text-primary tracking-tight">Bloat</div>
        <button
            class="bg-surface-dim border border-secondary text-on-surface font-body-base font-semibold px-md py-sm rounded hover:border-secondary-fixed transition-colors duration-200 flex items-center gap-sm">
            Start audit
            <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
        </button>
    </header>
    <!-- Main Content -->
    <main
        class="flex-grow flex flex-col items-center justify-center px-lg py-[120px] max-w-container-max mx-auto w-full">
        <!-- Hero Section -->
        <section class="text-center max-w-3xl mb-xl">
            <h1 class="font-metric-xl text-metric-xl text-on-surface mb-md">Find out where your AI bill is bloated</h1>
            <p class="font-h2 text-h2 text-on-surface-variant mb-lg font-normal">Free audit. No login. Takes 2 minutes.
            </p>
            <button
                class="bg-primary-container text-surface-container-lowest font-body-base font-semibold px-lg py-md rounded-lg hover:bg-primary-fixed transition-colors duration-200">
                Audit my stack
            </button>
        </section>
        <!-- Stats Grid (Bento style) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-md w-full max-w-4xl mt-xl">
            <div
                class="bg-[#111111] border border-[#262626] rounded-lg p-lg flex flex-col justify-between items-start hover:bg-[#1A1A1A] transition-colors duration-200">
                <span class="material-symbols-outlined text-primary-container mb-sm text-[24px]">savings</span>
                <div>
                    <div class="font-metric-lg text-metric-lg text-on-surface mb-xs">$340/mo</div>
                    <div class="font-label-caps text-label-caps text-on-surface-variant uppercase">Avg. startup saves
                    </div>
                </div>
            </div>
            <div
                class="bg-[#111111] border border-[#262626] rounded-lg p-lg flex flex-col justify-between items-start hover:bg-[#1A1A1A] transition-colors duration-200">
                <span class="material-symbols-outlined text-primary-container mb-sm text-[24px]">build</span>
                <div>
                    <div class="font-metric-lg text-metric-lg text-on-surface mb-xs">8</div>
                    <div class="font-label-caps text-label-caps text-on-surface-variant uppercase">Tools covered</div>
                </div>
            </div>
            <div
                class="bg-[#111111] border border-[#262626] rounded-lg p-lg flex flex-col justify-between items-start hover:bg-[#1A1A1A] transition-colors duration-200">
                <span class="material-symbols-outlined text-primary-container mb-sm text-[24px]">analytics</span>
                <div>
                    <div class="font-metric-lg text-metric-lg text-on-surface mb-xs">1,200</div>
                    <div class="font-label-caps text-label-caps text-on-surface-variant uppercase">Audits run</div>
                </div>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <footer
        class="bg-surface dark:bg-surface flex flex-col md:flex-row justify-between items-center w-full px-lg py-xl gap-md border-t border-outline-variant flat no shadows mt-auto">
        <div class="font-label-caps text-label-caps text-on-surface">© 2024 Bloat. Built by Credex.</div>
        <nav class="flex gap-lg">
            <a class="font-body-sm text-body-sm text-secondary dark:text-secondary text-on-surface-variant hover:text-primary transition-colors"
                href="#">Privacy Policy</a>
            <a class="font-body-sm text-body-sm text-secondary dark:text-secondary text-on-surface-variant hover:text-primary transition-colors"
                href="#">Terms of Service</a>
            <a class="font-body-sm text-body-sm text-secondary dark:text-secondary text-on-surface-variant hover:text-primary transition-colors"
                href="#">Contact</a>
        </nav>
    </footer>
</body>

</html>
