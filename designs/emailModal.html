<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bloat - Save Report</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#929090",
                        "surface-dim": "#131313",
                        "tertiary": "#c9c6c5",
                        "primary-fixed-dim": "#ffb5a0",
                        "primary-container": "#ff5722",
                        "surface-variant": "#353535",
                        "primary": "#ffb5a0",
                        "on-error": "#690005",
                        "background": "#131313",
                        "error-container": "#93000a",
                        "surface-bright": "#393939",
                        "on-tertiary": "#313030",
                        "surface": "#131313",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#862200",
                        "on-error-container": "#ffdad6",
                        "outline": "#ab8980",
                        "on-primary": "#5f1500",
                        "surface-container-highest": "#353535",
                        "inverse-on-surface": "#313030",
                        "tertiary-fixed": "#e5e2e1",
                        "on-secondary-fixed-variant": "#454747",
                        "on-tertiary-container": "#2a2a29",
                        "on-secondary-container": "#b4b5b5",
                        "on-tertiary-fixed-variant": "#474646",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#c6c6c7",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#ffdbd1",
                        "surface-container": "#20201f",
                        "inverse-surface": "#e5e2e1",
                        "secondary-container": "#454747",
                        "on-tertiary-fixed": "#1c1b1b",
                        "outline-variant": "#5b4039",
                        "secondary-fixed": "#e2e2e2",
                        "on-primary-fixed": "#3b0900",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "tertiary-fixed-dim": "#c9c6c5",
                        "surface-container-high": "#2a2a2a",
                        "inverse-primary": "#b02f00",
                        "on-secondary": "#2f3131",
                        "on-primary-container": "#541200",
                        "on-surface-variant": "#e4beb4",
                        "surface-tint": "#ffb5a0",
                        "on-secondary-fixed": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "24px",
                        "unit": "4px",
                        "xs": "4px",
                        "xl": "48px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-base": ["Inter"],
                        "metric-xl": ["Inter"],
                        "metric-lg": ["Inter"],
                        "h2": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-caps": ["11px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-base": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "metric-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "metric-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for cleaner look during modal open state */
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body
    class="bg-surface text-on-surface font-body-base h-screen w-screen overflow-hidden relative flex flex-col antialiased">
    <!-- Simulated Blurred Background (Results Page) -->
    <nav
        class="flex justify-between items-center w-full px-lg py-md sticky top-0 z-10 bg-surface border-b border-outline-variant">
        <div class="font-h1 text-h1 font-bold text-primary">Bloat</div>
        <button
            class="bg-surface-container border border-outline-variant text-on-surface font-body-base px-md py-sm rounded">Export</button>
    </nav>
    <main
        class="flex-1 p-lg grid grid-cols-1 md:grid-cols-3 gap-lg opacity-20 pointer-events-none w-full max-w-container-max mx-auto">
        <div
            class="bg-surface-container-low border border-outline-variant rounded-lg p-lg md:col-span-2 h-[300px] flex flex-col">
            <div class="h-8 w-1/3 bg-surface-container mb-md rounded"></div>
            <div class="flex-1 border-t border-outline-variant mt-md pt-md">
                <div class="h-full w-full bg-surface-container-highest rounded-sm"></div>
            </div>
        </div>
        <div
            class="bg-surface-container-low border border-outline-variant rounded-lg p-lg h-[300px] flex flex-col gap-md">
            <div class="h-6 w-1/2 bg-surface-container rounded"></div>
            <div class="h-12 w-3/4 bg-primary-container/20 rounded"></div>
            <div class="h-12 w-full bg-surface-container rounded mt-auto"></div>
        </div>
        <div class="bg-surface-container-low border border-outline-variant rounded-lg p-lg md:col-span-3 h-[400px]">
            <div class="h-6 w-1/4 bg-surface-container rounded mb-lg"></div>
            <div class="space-y-sm">
                <div class="h-12 w-full bg-surface-container-highest rounded-sm"></div>
                <div class="h-12 w-full bg-surface-container-highest rounded-sm"></div>
                <div class="h-12 w-full bg-surface-container-highest rounded-sm"></div>
                <div class="h-12 w-full bg-surface-container-highest rounded-sm"></div>
            </div>
        </div>
    </main>
    <!-- Modal Overlay -->
    <div class="absolute inset-0 bg-[#000000]/80 z-40 backdrop-blur-sm flex items-center justify-center p-md">
        <!-- Modal Card (Adhering to dark theme 'Flat-Plus' minimalist guidelines) -->
        <div
            class="bg-surface-container-low border border-outline-variant rounded-lg w-full max-w-[440px] relative p-xl flex flex-col gap-lg shadow-none">
            <!-- Close Button -->
            <button
                class="absolute top-md right-md text-on-surface-variant hover:text-on-surface transition-colors p-unit flex items-center justify-center">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
            <!-- Header -->
            <div class="flex flex-col gap-xs pr-xl">
                <h2 class="font-h2 text-h2 text-on-surface tracking-tight">Save your Bloat report</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">We'll securely send you a detailed,
                    actionable breakdown of your infrastructure savings.</p>
            </div>
            <!-- Form -->
            <form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
                <!-- Email Input -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email
                        <span class="text-primary">*</span></label>
                    <input
                        class="bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-base p-md w-full focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/40 h-11"
                        id="email" placeholder="you@company.com" required="" type="email" />
                </div>
                <!-- Company Input -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-caps text-label-caps text-on-surface-variant uppercase"
                        for="company">Company <span
                            class="text-on-surface-variant/50 lowercase normal-case">(Optional)</span></label>
                    <input
                        class="bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-base p-md w-full focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/40 h-11"
                        id="company" placeholder="Acme Corp" type="text" />
                </div>
                <!-- Role Dropdown -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-caps text-label-caps text-on-surface-variant uppercase"
                        for="role">Role</label>
                    <div class="relative">
                        <select
                            class="bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-base p-md w-full appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all h-11"
                            id="role">
                            <option disabled="" hidden="" selected="" value="">Select your role</option>
                            <option class="bg-surface-container-low" value="founder">Founder</option>
                            <option class="bg-surface-container-low" value="eng_manager">Eng. Manager</option>
                            <option class="bg-surface-container-low" value="cto">CTO</option>
                            <option class="bg-surface-container-low" value="other">Other</option>
                        </select>
                        <div
                            class="absolute inset-y-0 right-0 flex items-center pr-md pointer-events-none text-on-surface-variant">
                            <span class="material-symbols-outlined text-[20px]">expand_more</span>
                        </div>
                    </div>
                </div>
                <!-- Submit Button -->
                <button
                    class="bg-primary-container text-[#ffffff] font-body-base font-semibold rounded p-md w-full text-center hover:bg-[#e64a19] transition-colors mt-sm h-11 flex items-center justify-center"
                    type="submit">
                    Email me the report
                </button>
            </form>
        </div>
    </div>
</body>

</html>
